# HTTP 自动跳转 HTTPS（统一跳转到 www）
server {
    listen 80;
    server_name chyichyi.com www.chyichyi.com;
    
    # 强制跳转到 HTTPS 的 www 版本
    return 301 https://www.chyichyi.com$request_uri;
}

# HTTPS 主配置（处理 www 域名）
server {
    listen 443 ssl http2;
    server_name www.chyichyi.com;  # 只处理 www 域名
    
    # SSL 证书配置（使用你的 www 证书）
    ssl_certificate /etc/nginx/ssl/www.chyichyi.com.pem;      # 证书文件
    ssl_certificate_key /etc/nginx/ssl/www.chyichyi.com.key;  # 私钥文件
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # 处理 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # 代理 API 请求到后端
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# 处理根域名跳转到 www（使用相同的证书）
server {
    listen 443 ssl http2;
    server_name chyichyi.com;  # 根域名
    
    # 使用相同的 www 证书（虽然证书是 www 的，但这样配置没问题）
    ssl_certificate /etc/nginx/ssl/www.chyichyi.com.pem;
    ssl_certificate_key /etc/nginx/ssl/www.chyichyi.com.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    
    # 跳转到 www 版本
   # 添加代理配置（和 www 一样）
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
    
    location / {
        proxy_pass http://frontend:80/;  # 或者直接返回文件
        # 或者直接返回 301 跳转到 www
        # return 301 https://www.chyichyi.com$request_uri;
    }
}
